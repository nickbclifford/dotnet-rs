name: Valgrind

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 4 * * *' # Daily at 04:00 UTC (offset from Miri 02:00 and fuzz midnight cron)

jobs:
  valgrind:
    name: Valgrind
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DOTNET_USE_PREBUILT_FIXTURES: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.8.2

      - name: Setup .NET SDK (10.0.x)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev valgrind libc6-dbg

      - name: Resolve fixture output directory
        id: fixture-output-dir
        run: |
          OUTPUT_DIR=$(cargo run --quiet -p xtask -- fixtures output-dir --profile debug)
          echo "path=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Compute fixture cache key
        id: fixture-cache-key
        run: |
          CACHE_KEY=$(cargo run --quiet -p xtask -- fixtures cache-key --profile debug)
          echo "key=$CACHE_KEY" >> "$GITHUB_OUTPUT"

      - name: Cache .NET fixtures
        id: cache-fixtures
        uses: actions/cache@v4
        with:
          path: ${{ steps.fixture-output-dir.outputs.path }}
          key: ${{ runner.os }}-dotnet-fixtures-${{ steps.fixture-cache-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-dotnet-fixtures-

      - name: Build fixtures
        if: steps.cache-fixtures.outputs.cache-hit != 'true'
        run: cargo run -p xtask -- fixtures build --output-dir "${{ steps.fixture-output-dir.outputs.path }}"

      - name: Build integration test binary (No features)
        run: |
          cargo test -p dotnet-cli --test integration_tests \
            --no-run \
            --no-default-features

      - name: Run Valgrind (No features)
        continue-on-error: true
        run: |
          BINARY=$(ls -t target/debug/deps/integration_tests-* 2>/dev/null | grep -v '\.d$' | head -1)
          if [ -z "$BINARY" ]; then
            echo "ERROR: integration_tests binary not found in target/debug/deps/" >&2
            exit 1
          fi
          echo "Using binary: $BINARY"
          EXIT=0
          for TEST in \
            integration_tests_impl::fixtures::hello_world \
            integration_tests_impl::fixtures::memory_nullable_boxing_42; do
            echo "--- Running Valgrind for: $TEST ---"
            timeout 600s valgrind \
              --suppressions=valgrind.supp \
              --error-exitcode=1 \
              --leak-check=full \
              --show-leak-kinds=all \
              -s \
              "$BINARY" \
              --test-threads=1 \
              --nocapture \
              --exact \
              "$TEST" || EXIT=$?
          done
          exit $EXIT

      - name: Build integration test binary (Multithreading)
        run: |
          cargo test -p dotnet-cli --test integration_tests \
            --no-run \
            --no-default-features \
            --features multithreading

      - name: Run Valgrind (Multithreading)
        continue-on-error: true
        run: |
          BINARY=$(ls -t target/debug/deps/integration_tests-* 2>/dev/null | grep -v '\.d$' | head -1)
          if [ -z "$BINARY" ]; then
            echo "ERROR: integration_tests binary not found in target/debug/deps/" >&2
            exit 1
          fi
          echo "Using binary: $BINARY"
          EXIT=0
          for TEST in \
            integration_tests_impl::fixtures::threading_monitor_try_enter_timeout_42 \
            integration_tests_impl::fixtures::threading_monitor_try_enter_timeout_single_42; do
            echo "--- Running Valgrind for: $TEST ---"
            timeout 600s valgrind \
              --suppressions=valgrind.supp \
              --error-exitcode=1 \
              --leak-check=full \
              --show-leak-kinds=all \
              -s \
              "$BINARY" \
              --test-threads=1 \
              --nocapture \
              --exact \
              "$TEST" || EXIT=$?
          done
          exit $EXIT
