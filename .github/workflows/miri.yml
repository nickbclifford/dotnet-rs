name: Miri

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *' # Daily at 02:00 UTC (offset from fuzz midnight cron)

jobs:
  miri:
    name: Miri (${{ matrix.crate }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MIRIFLAGS: "-Zmiri-strict-provenance"
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: dotnet-value
            args: '-- --test-threads=1'
          # dotnet-utils is kept out of the strict-provenance matrix for now:
          # its cross-arena stress test currently trips Miri in upstream parking_lot_core.
          - crate: dotnet-assemblies
            args: '-- --test-threads=1'
          - crate: dotnet-vm
            args: '-- --test-threads=1 --skip stress'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (nightly + miri)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.8.2

      - name: Setup .NET SDK (10.0.x)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev

      - name: Run Miri (${{ matrix.crate }})
        run: cargo +nightly miri test -p ${{ matrix.crate }} ${{ matrix.args }}
