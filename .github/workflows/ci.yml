name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  doc-lint:
    name: Documentation Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check doc-to-code drift
        run: bash scripts/check_doc_drift.sh

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Rustfmt Check
        run: cargo fmt --all -- --check

  matrix-definitions:
    name: Resolve Feature Matrices
    runs-on: ubuntu-latest
    outputs:
      clippy-features: ${{ steps.matrices.outputs.clippy-features }}
      test-features: ${{ steps.matrices.outputs.test-features }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve clippy/test matrices from xtask
        id: matrices
        run: |
          CLIPPY_FEATURES=$(cargo run --quiet -p xtask -- matrix clippy-features --format json)
          TEST_FEATURES=$(cargo run --quiet -p xtask -- matrix test-features --format json)
          echo "clippy-features=$CLIPPY_FEATURES" >> "$GITHUB_OUTPUT"
          echo "test-features=$TEST_FEATURES" >> "$GITHUB_OUTPUT"

  clippy:
    name: Clippy Check
    runs-on: ubuntu-latest
    needs: [matrix-definitions]
    timeout-minutes: 15
    strategy:
      matrix:
        features: ${{ fromJson(needs.matrix-definitions.outputs.clippy-features) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.8.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev

      - name: Clippy Check (${{ matrix.features || 'no features' }})
        env:
          DOTNET_SKIP_BUILD: "1"
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo clippy --all-targets --no-default-features -- -D warnings
          else
            cargo clippy --all-targets --no-default-features --features ${{ matrix.features }} -- -D warnings
          fi

  build-script-regression:
    name: Build Script Regression Probes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.8.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev ripgrep

      - name: Run build-script regression probes
        run: bash scripts/check_build_script_regressions.sh

  build-fixtures:
    name: Build .NET Fixtures
    runs-on: ubuntu-latest
    outputs:
      fixtures-path: ${{ steps.fixture-output-dir.outputs.path }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve fixture output directory
        id: fixture-output-dir
        run: |
          OUTPUT_DIR=$(cargo run --quiet -p xtask -- fixtures output-dir --profile debug)
          echo "path=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Compute fixture cache key
        id: fixture-cache-key
        run: |
          CACHE_KEY=$(cargo run --quiet -p xtask -- fixtures cache-key --profile debug)
          echo "key=$CACHE_KEY" >> "$GITHUB_OUTPUT"

      - name: Cache .NET fixtures
        id: cache-fixtures
        uses: actions/cache@v4
        with:
          path: ${{ steps.fixture-output-dir.outputs.path }}
          key: ${{ runner.os }}-dotnet-fixtures-${{ steps.fixture-cache-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-dotnet-fixtures-

      - name: Build fixtures
        if: steps.cache-fixtures.outputs.cache-hit != 'true'
        run: cargo run -p xtask -- fixtures build --output-dir "${{ steps.fixture-output-dir.outputs.path }}"

      - name: Upload fixtures
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-fixtures
          path: ${{ steps.fixture-output-dir.outputs.path }}
          retention-days: 1

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [matrix-definitions, build-fixtures]
    timeout-minutes: 30
    env:
      RUST_TEST_THREADS: "1"
      DOTNET_TEST_TIMEOUT_SECS: "180"
      DOTNET_USE_PREBUILT_FIXTURES: "1"
    strategy:
      fail-fast: false
      matrix:
        features: ${{ fromJson(needs.matrix-definitions.outputs.test-features) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.8.2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download .NET fixtures
        uses: actions/download-artifact@v4
        with:
          name: dotnet-fixtures
          path: ${{ needs.build-fixtures.outputs.fixtures-path }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev

      - name: Build (${{ matrix.features || 'no features' }})
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo build --verbose --no-default-features
          else
            cargo build --verbose --no-default-features --features ${{ matrix.features }}
          fi

      - name: Enable GC pointer-read trace (${{ matrix.features || 'no features' }})
        if: ${{ matrix.features == '' || matrix.features == 'generic-constraint-validation' }}
        run: |
          echo "DOTNET_TRACE_GC_PTR_READ=1" >> "$GITHUB_ENV"
          echo "DOTNET_TRACE_CULTUREDATA_WRITES=1" >> "$GITHUB_ENV"

      - name: Run tests (${{ matrix.features || 'no features' }})
        timeout-minutes: 20
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo test --verbose --no-default-features -- --nocapture
          else
            cargo test --verbose --no-default-features --features ${{ matrix.features }} -- --nocapture
          fi

      - name: Hang-probe integration tests (${{ matrix.features || 'no features' }})
        if: ${{ matrix.features == 'multithreading' }}
        timeout-minutes: 5
        env:
          DOTNET_TEST_TIMEOUT_SECS: "60"
        run: |
          FEATURES_ARGS="--no-default-features"
          if [ -n "${{ matrix.features }}" ]; then
            FEATURES_ARGS="$FEATURES_ARGS --features ${{ matrix.features }}"
          fi
          FAIL=0
          for test in \
            "integration_tests_impl::fixtures::test_allocation_pressure" \
            "integration_tests_impl::fixtures::test_gc_coordinator" \
            "integration_tests_impl::fixtures::test_multiple_arenas" \
            "integration_tests_impl::fixtures::test_stw_stress"; do
            cargo test $FEATURES_ARGS -p dotnet-cli --test integration_tests "$test" \
              -- --test-threads=1 --nocapture || FAIL=1
          done
          exit $FAIL
