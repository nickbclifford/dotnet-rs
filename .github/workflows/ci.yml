name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Rustfmt Check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        features:
          - ""                                    # No features
          - "multithreading"                      # Multithreading (full)
          - "generic-constraint-validation"       # Generic constraint validation
          - "memory-validation"                   # Memory validation (GC checks)
          - "metadata-validation"                 # Metadata validation (Assembly checks)
          - "fuzzing"                             # Fuzzing instrumentation and traits
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.8.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev

      - name: Clippy Check (${{ matrix.features || 'no features' }})
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo clippy --all-targets --no-default-features -- -D warnings
          else
            cargo clippy --all-targets --no-default-features --features ${{ matrix.features }} -- -D warnings
          fi

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUST_TEST_THREADS: "1"
      DOTNET_TEST_TIMEOUT_SECS: "180"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Single-threaded configurations
          - name: "No features"
            features: ""

          # Multithreading configurations (full)
          - name: "Multithreading"
            features: "multithreading"

          # Generic constraint validation configuration
          - name: "Generic constraint validation"
            features: "generic-constraint-validation"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.8.2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache .NET fixtures
        uses: actions/cache@v4
        with:
          path: crates/dotnet-cli/target/dotnet-fixtures
          key: ${{ runner.os }}-dotnet-fixtures-${{ hashFiles('crates/dotnet-cli/tests/fixtures/**/*.cs', 'crates/dotnet-cli/tests/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-fixtures-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev

      - name: Build (${{ matrix.name }})
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo build --verbose --no-default-features
          else
            cargo build --verbose --no-default-features --features ${{ matrix.features }}
          fi

      - name: Enable GC pointer-read trace (${{ matrix.name }})
        if: ${{ matrix.features == '' || matrix.features == 'generic-constraint-validation' }}
        run: |
          echo "DOTNET_TRACE_GC_PTR_READ=1" >> "$GITHUB_ENV"
          echo "DOTNET_TRACE_CULTUREDATA_WRITES=1" >> "$GITHUB_ENV"

      - name: Run tests (${{ matrix.name }})
        timeout-minutes: 20
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo test --verbose --no-default-features -- --nocapture
          else
            cargo test --verbose --no-default-features --features ${{ matrix.features }} -- --nocapture
          fi

      - name: Hang-probe integration tests (${{ matrix.name }})
        if: ${{ matrix.features == 'multithreading' }}
        timeout-minutes: 5
        env:
          DOTNET_TEST_TIMEOUT_SECS: "60"
        run: |
          FEATURES_ARGS="--no-default-features"
          if [ -n "${{ matrix.features }}" ]; then
            FEATURES_ARGS="$FEATURES_ARGS --features ${{ matrix.features }}"
          fi
          FAIL=0
          for test in \
            "integration_tests_impl::fixtures::test_allocation_pressure" \
            "integration_tests_impl::fixtures::test_gc_coordinator" \
            "integration_tests_impl::fixtures::test_multiple_arenas" \
            "integration_tests_impl::fixtures::test_stw_stress"; do
            cargo test $FEATURES_ARGS -p dotnet-cli --test integration_tests "$test" \
              -- --test-threads=1 --nocapture || FAIL=1
          done
          exit $FAIL
